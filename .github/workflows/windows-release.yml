name: Windows Release Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11

      - name: Install dependencies (SDL3, FreeType)
        run: vcpkg install sdl3 freetype --triplet x64-windows

      - name: Configure CMake
        run: >
          cmake -S . -B build
          -G "Visual Studio 17 2022" -A x64
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build (Release)
        run: cmake --build build --config Release

      - name: Package executable, shaders, and runtime DLLs
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $distDir = Join-Path $PWD "dist\CAD_OpenGL-windows-x64"
          New-Item -ItemType Directory -Path $distDir -Force | Out-Null

          $exePath = Join-Path $PWD "build\Release\CAD_OpenGL.exe"
          if (!(Test-Path $exePath)) {
            throw "Expected executable not found: $exePath"
          }
          Copy-Item $exePath (Join-Path $distDir "CAD_OpenGL.exe") -Force

          $shaderPath = Join-Path $PWD "build\shaders"
          if (Test-Path $shaderPath) {
            Copy-Item $shaderPath (Join-Path $distDir "shaders") -Recurse -Force
          } else {
            throw "Expected shader folder not found: $shaderPath"
          }

          $runtimeDllPatterns = @(
            "SDL3*.dll",
            "freetype*.dll",
            "zlib*.dll",
            "bz2*.dll",
            "brotli*.dll",
            "png*.dll",
            "harfbuzz*.dll"
          )

          $runtimeRoots = @(
            (Join-Path $env:VCPKG_ROOT "installed\x64-windows\bin"),
            (Join-Path $env:VCPKG_ROOT "installed\x64-windows\tools")
          )

          foreach ($root in $runtimeRoots) {
            if (Test-Path $root) {
              foreach ($pattern in $runtimeDllPatterns) {
                Get-ChildItem -Path $root -Filter $pattern -File -ErrorAction SilentlyContinue |
                  ForEach-Object { Copy-Item $_.FullName $distDir -Force }
              }
            }
          }

          if (!(Test-Path (Join-Path $distDir "SDL3.dll"))) {
            throw "SDL3.dll was not copied into the package."
          }

          $zipPath = Join-Path $PWD "CAD_OpenGL-windows-x64.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path $distDir -DestinationPath $zipPath

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: CAD_OpenGL-windows-x64
          path: CAD_OpenGL-windows-x64.zip

      - name: Attach zip to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: CAD_OpenGL-windows-x64.zip
